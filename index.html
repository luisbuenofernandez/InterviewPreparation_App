<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>

    <section>
        <div class="eight-px-separation">
            <h1 id="question"></h1>
        </div>
        <div class="eight-px-separation" id="explanation">
        </div>
        <div class="eight-px-separation" id="answer">
        </div>
        <div class="eight-px-separation" id="example">
        </div>
        <div class="eight-px-separation" id="topic">
        </div>
    </section>

    <section id="buttonsHomePage" class="eight-px-separation buttons">
        <button id="nextQuestion" class="">Next</button>
        <div id="manipulatingInformation">
            <button id="editCurrentQuestion">Edit</button>
            <button class="saveChangesAndCancelChanges">
                Save
            </button>
            <button class="saveChangesAndCancelChanges">
                Cancel
            </button>
            <button class="saveChangesAndCancelChanges">
                Add New
            </button>

            <button id="deleteCurrentQuestion">Delete</button>
        </div>
        <button id="showAllQuestions" onclick="window.location.href='showAllQuestions.html'">Search</button>
    </section>

    <script src="script.js"></script>
</body>

</html>
