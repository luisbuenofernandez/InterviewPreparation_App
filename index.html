<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>

    <section>
        <div class="eight-px-separation editable" id="question" contentEditable="false"></div>
     
        <div class="eight-px-separation editable" id="explanation" contentEditable="false">
        </div>
        <div class="eight-px-separation editable" id="answer" contentEditable="false">
        </div>
        <div class="eight-px-separation editable" id="example" contentEditable="false">
        </div>

        
        <label for="topic">Category</label>
        <select name="topic" id="topic">
            <option value="Recruiter" selected>Recruiter</option>
            <option value="Advice">Advice</option>
            <option value="Candidate">Candidate</option>
            <option value="Encouragement">Encouragement</option>
            
        </select>
    </section>

    <section id="buttonsHomePage" class="eight-px-separation buttons">
        <button id="previousQuestion_btn" class="">Back</button>
        <button id="nextQuestion" class="">Next</button>

        <div class="manipulatingInformation">
            <button id="btn_editCurrentQuestion">Edit</button>
            <button class="saveChangesAndCancelChanges" hidden>
                Save
            </button>
            <button class="saveChangesAndCancelChanges" hidden>
                Cancel
            </button>
        </div>

        <button class="saveChangesAndCancelChanges">
            Add New
        </button><button id="deleteCurrentQuestion">Delete</button>
        <button id="showAllQuestions" onclick="window.location.href='showAllQuestions.html'">Search</button>
    </section>

    <script src="script.js"></script>
</body>

</html>
